<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg width="100%" viewBox="0 0 680 516">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
    </marker>
  </defs>

  <text x="420" y="147" text-anchor="middle" style="font-size:9px;fill:var(--color-text-tertiary);font-weight:500;letter-spacing:.08em;">SYNCHRONOUS</text>
  <text x="601" y="313" text-anchor="middle" style="font-size:9px;fill:var(--color-text-tertiary);font-weight:500;letter-spacing:.08em;">ASYNC CONSUMERS</text>
  <line x1="536" y1="318" x2="665" y2="318" style="stroke:var(--color-border-tertiary);stroke-width:0.5;"></line>

  <g id="c-client" style="cursor:pointer;" onclick="sendPrompt('How does the student browser communicate with the API Gateway in an e-learning app?')">
    <rect x="20" y="208" width="80" height="44" rx="8" style="fill: rgb(230, 241, 251); stroke: rgb(24, 95, 165); stroke-width: 1.5;"></rect>
    <text x="60" y="226" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:var(--color-text-primary);font-weight:500;">Student</text>
    <text x="60" y="242" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">browser</text>
  </g>

  <g id="c-gateway">
    <rect x="148" y="148" width="144" height="184" rx="10" style="fill: rgb(230, 241, 251); stroke: rgb(24, 95, 165); stroke-width: 1.5;"></rect>
    <text x="220" y="168" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:var(--color-text-primary);font-weight:500;">API Gateway</text>
    <rect id="pill-jwt" x="160" y="181" width="120" height="27" rx="5" style="fill: var(--color-background-tertiary);"></rect>
    <text x="220" y="195" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-secondary);">JWT auth</text>
    <rect id="pill-rate" x="160" y="214" width="120" height="27" rx="5" style="fill: var(--color-background-tertiary);"></rect>
    <text x="220" y="228" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-secondary);">Rate limiter</text>
    <rect id="pill-route" x="160" y="247" width="120" height="27" rx="5" style="fill: var(--color-background-tertiary);"></rect>
    <text x="220" y="261" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-secondary);">Router</text>
    <rect id="pill-log" x="160" y="280" width="120" height="27" rx="5" style="fill: rgb(133, 183, 235);"></rect>
    <text x="220" y="294" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-secondary);">Trace logger</text>
  </g>

  <g id="c-course" style="cursor:pointer;" onclick="sendPrompt('What does the Course Service handle in a microservices e-learning platform?')">
    <rect x="358" y="158" width="122" height="40" rx="8" style="fill: rgb(230, 241, 251); stroke: rgb(24, 95, 165); stroke-width: 1.5;"></rect>
    <text x="419" y="174" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:var(--color-text-primary);font-weight:500;">Course service</text>
    <text x="419" y="190" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">enrollment logic</text>
  </g>
  <g id="c-user" style="cursor:pointer;" onclick="sendPrompt('How does service-to-service sync communication work between Course and User service?')">
    <rect x="358" y="213" width="122" height="40" rx="8" style="fill: rgb(230, 241, 251); stroke: rgb(24, 95, 165); stroke-width: 1.5;"></rect>
    <text x="419" y="229" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:var(--color-text-primary);font-weight:500;">User service</text>
    <text x="419" y="245" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">profile, eligibility</text>
  </g>
  <g id="c-payment" style="cursor:pointer;" onclick="sendPrompt('When does the Payment Service get called synchronously during course enrollment?')">
    <rect x="358" y="268" width="122" height="40" rx="8" style="fill: var(--color-background-secondary); stroke: var(--color-border-secondary); stroke-width: 0.5;"></rect>
    <text x="419" y="284" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:var(--color-text-primary);font-weight:500;">Payment service</text>
    <text x="419" y="300" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">billing, invoices</text>
  </g>

  <g id="c-queue" style="cursor:pointer;" onclick="sendPrompt('How does Kafka handle async event publishing in a microservices architecture?')">
    <rect x="358" y="355" width="122" height="40" rx="8" style="fill: rgb(225, 245, 238); stroke: rgb(15, 110, 86); stroke-width: 1.5;"></rect>
    <text x="419" y="371" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:var(--color-text-primary);font-weight:500;">Kafka queue</text>
    <text x="419" y="387" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">enrollment.created</text>
  </g>

  <g id="c-notif" style="cursor:pointer;" onclick="sendPrompt('How does a Notification Service consume Kafka events to send welcome emails?')">
    <rect x="544" y="325" width="116" height="34" rx="8" style="fill: rgb(225, 245, 238); stroke: rgb(15, 110, 86); stroke-width: 1.5;"></rect>
    <text x="602" y="338" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-primary);font-weight:500;">Notification svc</text>
    <text x="602" y="352" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">email, push</text>
  </g>
  <g id="c-progress" style="cursor:pointer;" onclick="sendPrompt('How does a Progress Tracker microservice initialize student progress after enrollment?')">
    <rect x="544" y="370" width="116" height="34" rx="8" style="fill: rgb(225, 245, 238); stroke: rgb(15, 110, 86); stroke-width: 1.5;"></rect>
    <text x="602" y="383" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-primary);font-weight:500;">Progress tracker</text>
    <text x="602" y="397" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">init progress</text>
  </g>
  <g id="c-analytics" style="cursor:pointer;" onclick="sendPrompt('How does an Analytics Service use async events for enrollment funnel tracking?')">
    <rect x="544" y="415" width="116" height="34" rx="8" style="fill: rgb(225, 245, 238); stroke: rgb(15, 110, 86); stroke-width: 1.5;"></rect>
    <text x="602" y="428" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-primary);font-weight:500;">Analytics svc</text>
    <text x="602" y="442" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary);">events, funnels</text>
  </g>

  <g id="c-obs" style="cursor:pointer;" onclick="sendPrompt('How does distributed tracing with Jaeger and Prometheus work across microservices?')">
    <rect x="20" y="462" width="640" height="36" rx="8" style="fill: rgb(238, 237, 254); stroke: rgb(83, 74, 183); stroke-width: 1.5;"></rect>
    <text x="175" y="480" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-primary);font-weight:500;">Distributed Traces (Jaeger)</text>
    <line x1="310" y1="467" x2="310" y2="493" style="stroke:var(--color-border-tertiary);stroke-width:0.5;"></line>
    <text x="400" y="480" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-primary);font-weight:500;">Metrics (Prometheus)</text>
    <line x1="490" y1="467" x2="490" y2="493" style="stroke:var(--color-border-tertiary);stroke-width:0.5;"></line>
    <text x="575" y="480" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-primary);font-weight:500;">Logs (ELK)</text>
  </g>

  <line id="a-req" x1="100" y1="228" x2="146" y2="228" style="stroke: var(--color-border-secondary); stroke-width: 1;" marker-end="url(#arr)"></line>
  <line id="a-resp" x1="148" y1="236" x2="100" y2="236" style="stroke: var(--color-border-secondary); stroke-width: 1; stroke-dasharray: 4, 2;" marker-end="url(#arr)"></line>

  <line id="a-to-course" x1="292" y1="175" x2="356" y2="175" style="stroke: var(--color-border-secondary); stroke-width: 1;" marker-end="url(#arr)"></line>
  <line id="a-from-course" x1="358" y1="183" x2="292" y2="183" style="stroke: var(--color-border-secondary); stroke-width: 1; stroke-dasharray: 4, 2;" marker-end="url(#arr)"></line>

  <line id="a-to-payment" x1="292" y1="285" x2="356" y2="285" style="stroke:var(--color-border-secondary);stroke-width:1;" marker-end="url(#arr)"></line>
  <line id="a-from-payment" x1="358" y1="293" x2="292" y2="293" style="stroke: var(--color-border-secondary); stroke-width: 1; stroke-dasharray: 4, 2;" marker-end="url(#arr)"></line>

  <line id="a-inner" x1="423" y1="198" x2="423" y2="211" style="stroke: var(--color-border-secondary); stroke-width: 1;" marker-end="url(#arr)"></line>
  <line id="a-inner-ret" x1="415" y1="213" x2="415" y2="200" style="stroke: var(--color-border-secondary); stroke-width: 1; stroke-dasharray: 3, 2;" marker-end="url(#arr)"></line>

  <path id="a-publish" d="M220 332 L220 375 L356 375" fill="none" style="stroke: var(--color-border-secondary); stroke-width: 1; stroke-dasharray: 6, 3;" marker-end="url(#arr)"></path>

  <line id="a-to-notif" x1="480" y1="368" x2="542" y2="342" style="stroke: var(--color-border-secondary); stroke-width: 1;" marker-end="url(#arr)"></line>
  <line id="a-to-progress" x1="480" y1="375" x2="542" y2="387" style="stroke: var(--color-border-secondary); stroke-width: 1;" marker-end="url(#arr)"></line>
  <line id="a-to-analytics" x1="480" y1="383" x2="542" y2="432" style="stroke: var(--color-border-secondary); stroke-width: 1;" marker-end="url(#arr)"></line>

  <line id="obs-line" x1="340" y1="462" x2="340" y2="335" style="stroke: rgb(127, 119, 221); stroke-width: 1; stroke-dasharray: 3, 3;"></line>
</svg>
</body>
</html>
